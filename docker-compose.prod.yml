# Production override for Docker Compose / Coolify style deployments.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm migrate
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm demo-seed
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm proactive-worker

services:
  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes: []

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-3.1-flash-image-preview}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-google/gemini-3.1-flash-image-preview}
      MINIO_BUCKET_ILLUSTRATIONS: ${MINIO_BUCKET_ILLUSTRATIONS:-illustrations}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS:-reports}
      ILLUSTRATION_DAILY_LIMIT: ${ILLUSTRATION_DAILY_LIMIT:-10}
    command: ["alembic", "upgrade", "head"]

  demo-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DEMO_PARENT_EMAIL: ${DEMO_PARENT_EMAIL:-ayse@demo.cuzdan-kocu.app}
      DEMO_PARENT_PASSWORD: ${DEMO_PARENT_PASSWORD:?DEMO_PARENT_PASSWORD is required}
      DEMO_MEHMET_EMAIL: ${DEMO_MEHMET_EMAIL:-mehmet@demo.cuzdan-kocu.app}
      DEMO_ELIF_EMAIL: ${DEMO_ELIF_EMAIL:-elif@demo.cuzdan-kocu.app}
    command: ["python", "-m", "app.workers.demo_seed"]

  proactive-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    command: ["python", "-m", "app.workers.proactive"]

  frontend:
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
